<!doctype html>
<html lang="en">
  <link rel="stylesheet" href="./styles.css" />
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>H4RING</title>
  </head>
  <body>
    <header>
      <h1>Welcome to H4RING!</h1>
    </header>

    <main>
      <a href="/rand">Enter the webring</a>

      <ul>
        {% for site in sites %}
        <li>
          <a class="member-link" href="{{ site.website.url | safe }}"
            >{{ site.website.name }}</a
          >
        </li>
        {% endfor %}
      </ul>
    </main>

    <footer>
      <p>Last updated at {{ current_time }}.</p>
      <p>
        Find the code on
        <a href="https://github.com/h4lodev/h4ring">GitHub</a>.
      </p>
      <p>
        Powered by
        <a href="https://github.com/k3rs3d/ringfairy">ringfairy</a>!
      </p>
    </footer>
  </body>
</html>
